{% extends "base.html" %}
{% block title %}PMP Quiz - Register{% endblock %}
{% block content %}
<div style="max-width:400px;margin:4rem auto">
  <div class="card" style="text-align:center">
    <h2 style="margin-bottom:1.5rem"><i class="fas fa-user-plus" style="color:var(--primary)"></i> Create Account</h2>
    <form method="POST">
      <div class="form-group"><label>Email (used as username)</label><input type="email" name="username" required autofocus placeholder="example@email.com"></div>
      <div class="form-group"><label>Password (4+ characters)</label><input type="password" name="password" required minlength="4" placeholder="Enter your password"></div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:.4rem">
          Referral ID <span style="font-weight:400;color:var(--muted);font-size:.82rem">(optional)</span>
        </label>
        <input type="text" name="referrer" placeholder="Enter referrer's email (optional)"
               style="border-color:{% if referrer_error %}#dc2626{% else %}var(--border){% endif %}">
        {% if referrer_error %}<p style="color:#dc2626;font-size:.8rem;margin-top:.3rem">{{ referrer_error }}</p>{% endif %}
      </div>
      <button type="submit" class="btn btn-success btn-lg" style="width:100%;justify-content:center;margin-top:.5rem">
        <i class="fas fa-check"></i> Sign Up</button>
    </form>
    <p style="margin-top:1.25rem;font-size:.9rem;color:var(--muted)">
      Already have an account? <a href="{{ url_for('login') }}" style="color:var(--primary);font-weight:600">Log In</a>
    </p>
  </div>
</div>
{% endblock %}

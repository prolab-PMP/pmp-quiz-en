{% extends "base.html" %}
{% block title %}PMP Quiz - Log in{% endblock %}

{% block extra_head %}<style>/* standalone-login: Log in/가입 화면에서는 nav/footer 숨겨 깔끔하게 */.navbar, footer, .footer, body > footer { display: none !important; }body { background: var(--bg, #f5f7fb); }.login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }.login-card { width: 100%; max-width: 440px; background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); padding: 40px 32px; text-align: center; }</style>{% endblock %}
{% block content %}
<div class="login-container">
    <div class="login-card">
        <i class="fas fa-graduation-cap" style="font-size:3rem;color:var(--primary);margin-bottom:16px;"></i>
        <h1>PMP Quiz</h1>
        <p>Email과 Password로 Log in하세요.</p>

        <form method="POST" action="{{ url_for('login') }}" id="loginForm">
            <div class="form-group">
                <input type="email" name="email" class="form-control"
                       placeholder="Email address" required autofocus
                       value="{{ email or '' }}"
                       style="text-align:center;font-size:1.05rem;">
            </div>
            <div class="form-group">
                <input type="password" name="password" class="form-control"
                       placeholder="Password (4+ chars)" required minlength="4"
                       style="text-align:center;font-size:1.05rem;">
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">
                <i class="fas fa-sign-in-alt"></i> Log in
            </button>
        </form>

        <p style="margin-top:20px;font-size:0.9rem;color:var(--text-muted);">
            Don't have an account? <a href="{{ url_for('signup') }}" style="color:var(--primary);font-weight:700;">✨ Sign up</a>
        </p>

        <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border);">
            <a href="{{ url_for('free_mode') }}" class="btn btn-outline btn-block">
                <i class="fas fa-gift"></i> Log in 없이 Free trial (50Question)
            </a>
        </div>
    </div>
</div>
{% endblock %}

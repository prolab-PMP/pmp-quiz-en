{% extends "base.html" %}
{% block title %}PMP Quiz - Login{% endblock %}
{% block content %}
<div style="max-width:400px;margin:4rem auto">
  <div class="card" style="text-align:center">
    <h1 style="font-size:2rem;margin-bottom:.5rem"><i class="fas fa-graduation-cap" style="color:var(--primary)"></i></h1>
    <h2 style="margin-bottom:1.5rem">Log In to PMP Quiz</h2>
    <form method="POST">
      <div class="form-group"><label>Email (Username)</label><input type="email" name="username" required autofocus placeholder="example@email.com"></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" required placeholder="Enter your password"></div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:.5rem">
        <i class="fas fa-sign-in-alt"></i> Log In</button>
    </form>
    <p style="margin-top:1.25rem;font-size:.9rem;color:var(--muted)">
      Don't have an account? <a href="{{ url_for('register') }}" style="color:var(--primary);font-weight:600">Sign Up</a>
    </p>
    <!-- Purchase banner -->
    <div style="margin-top:1.5rem;padding:1rem 1.25rem;background:linear-gradient(135deg,#fff7ed,#fef3c7);border:1.5px solid #fbbf24;border-radius:10px;text-align:center">
      <p style="font-size:.85rem;color:#92400e;font-weight:600;margin-bottom:.5rem">
        <i class="fas fa-crown" style="color:#f59e0b"></i> Unlock all 2,174 questions
      </p>
      <a href="{{ PURCHASE_URL }}"
         target="_blank" rel="noopener"
         style="display:inline-flex;align-items:center;gap:.4rem;background:#f59e0b;color:#fff;font-weight:700;font-size:.9rem;padding:.55rem 1.2rem;border-radius:8px;text-decoration:none;transition:opacity .2s"
         onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
        <i class="fas fa-shopping-cart"></i> Buy Premium
      </a>
    </div>
  </div>
</div>
{% endblock %}

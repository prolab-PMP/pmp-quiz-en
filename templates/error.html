{% extends "base.html" %}
{% block title %}{{ code }} Error{% endblock %}
{% block content %}
<div class="card" style="text-align:center;padding:60px 24px;">
    <div style="font-size:4rem;color:var(--text-muted);margin-bottom:16px;">{{ code }}</div>
    <h2 style="margin-bottom:12px;">{{ message }}</h2>
    <a href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('login') }}" class="btn btn-primary">
        <i class="fas fa-home"></i> 돌아가기
    </a>
</div>
{% endblock %}
